name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff (pyflakes + syntax)
        run: ruff check --select F,E9 scripts/
      - name: Byte-compile
        run: python -m py_compile scripts/*.py
